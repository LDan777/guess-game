<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TF家族猜猜看</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
:root {
    --primary: #ff8a00;
    --primary-light: #fff3e0;
    --text-main: #333;
    --text-sub: #888;
    --bg: #f6f7fb;
}

body {
    font-family: 'PingFang SC', sans-serif;
    background: linear-gradient(180deg, #f6f7fb, #eef1f7);
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--text-main);
}

#home-screen {
    position: fixed;
    inset: 0;
    background: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
}

.menu-box {
    background: white;
    padding: 45px 30px;
    border-radius: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    text-align: center;
    width: 80%;
    max-width: 320px;
}

.btn-main {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff8a00, #ffb347);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-main:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255,138,0,0.35);
}

.btn-main:active {
    transform: scale(0.96);
}

#game-interface {
    display: none;
    width: 100%;
    max-width: 1000px;
    padding: 15px;
}

.controls {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    margin-bottom: 20px;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
}

.card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
}

.card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 12px 25px rgba(0,0,0,0.15);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-name {
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
}

.card.excluded {
    opacity: 0.2;
    filter: grayscale(100%);
}

.card.excluded::after {
    content: "✖";
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 6px;
}

.hidden { display:none; }
</style>
</head>

<body>

<div id="home-screen">
    <div class="menu-box">
        <h2>✨ 游戏模式 ✨</h2>
        <button class="btn-main" onclick="enterMode('single')">单机练习</button>
        <button class="btn-main" onclick="enterMode('create')">创建房间</button>
        <button class="btn-main" onclick="enterMode('join')">加入房间</button>
    </div>
</div>

<div id="game-interface">
    <div class="controls">
        <div id="conn-status"></div>
        <button class="btn-main" style="width:auto" onclick="pickMyTarget()">抽角色</button>
        <div id="targetDisplay" class="hidden">你的角色：<strong id="targetName"></strong></div>
        <div>
            <label><input type="radio" name="mode" checked onclick="currentMode='exclude'">排除</label>
            <label style="margin-left:20px;"><input type="radio" name="mode" onclick="currentMode='submit'">提交</label>
        </div>
    </div>
    <div class="grid" id="starGrid"></div>
</div>

<script>
    const stars = [
        { name: "马嘉祺", group: "TNT", img: "images/马嘉祺.png" },
        { name: "丁程鑫", group: "TNT", img: "images/丁程鑫.png" },
        { name: "宋亚轩", group: "TNT", img: "images/宋亚轩.png" },
        { name: "刘耀文", group: "TNT", img: "images/刘耀文.png" },
        { name: "张真源", group: "TNT", img: "images/张真源.png" },
        { name: "严浩翔", group: "TNT", img: "images/严浩翔.png" },
        { name: "贺峻霖", group: "TNT", img: "images/贺峻霖.png" },
        { name: "朱志鑫", group: "三代", img: "images/朱志鑫.jpg" },
        { name: "张泽禹", group: "三代", img: "images/张泽禹.jpg" },
        { name: "张极", group: "三代", img: "images/张极.jpg" },
        { name: "左航", group: "三代", img: "images/左航.jpg" },
        { name: "苏新皓", group: "三代", img: "images/苏新皓.jpg" },
        { name: "左奇函", group: "四代", img: "images/左奇函.png" },
        { name: "张桂源", group: "四代", img: "images/张桂源.png" },
        { name: "张函瑞", group: "四代", img: "images/张函瑞.png" },
        { name: "王橹杰", group: "四代", img: "images/王橹杰.png" },
        { name: "左奇函", group: "四代", img: "images/左奇函.png" },
        { name: "陈奕恒", group: "四代", img: "images/陈奕恒.png" },
        { name: "杨博文", group: "四代", img: "images/杨博文.png" },
        { name: "杨涵博", group: "四代", img: "images/杨涵博.png" },
        { name: "张奕然", group: "四代", img: "images/张奕然.png" },
        { name: "聂玮辰", group: "四代", img: "images/聂玮辰.png" },
        { name: "陈思罕", group: "四代", img: "images/陈思罕.png" },
        { name: "魏子宸", group: "四代", img: "images/魏子宸.png" },
        { name: "李煜东", group: "四代", img: "images/李煜东.png" },
        { name: "陈浚铭", group: "四代", img: "images/陈浚铭.png" },
        { name: "王烁然", group: "四代", img: "images/王烁然.png" }
    ];

let currentMode = 'exclude';
let myTarget = "";

const grid = document.getElementById('starGrid');
stars.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<img src="${s.img}" onerror="this.src='https://via.placeholder.com/140x200?text=${s.name}'"><div class="card-name">${s.name}</div>`;
    card.onclick = () => handleCardClick(s.name, card);
    grid.appendChild(card);
});

function enterMode(mode) {
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('game-interface').style.display = 'block';
    document.getElementById('conn-status').innerText = '模式：' + mode;
}

function handleCardClick(name, el) {
    if (currentMode === 'exclude') {
        el.classList.toggle('excluded');
    } else {
        if (confirm(`确定是 ${name} 吗？`)) {
            alert(name === myTarget ? '猜对了！' : '猜错了');
        }
    }
}

function pickMyTarget() {
    const idx = Math.floor(Math.random() * stars.length);
    myTarget = stars[idx].name;
    document.getElementById('targetName').innerText = myTarget;
    document.getElementById('targetDisplay').classList.remove('hidden');
}
</script>

</body>
</html>
