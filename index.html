<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>明星猜猜看 - TF家族双模式版</title>
    <style>
        :root {
            --primary-color: #ff8a00;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --excluded-opacity: 0.15;
        }

        body {
            font-family: 'PingFang SC', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* 顶部控制区 */
        .controls {
            margin-bottom: 20px;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 800px;
        }

        .mode-selector {
            margin: 15px 0;
            padding: 10px;
            background: #eee;
            border-radius: 50px;
            display: inline-block;
        }

        .mode-selector label {
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
        }

        /* 目标显示框 */
        .target-box {
            background: #fff3e0;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed var(--primary-color);
            margin-top: 10px;
        }

        /* 明星网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            object-position: top;
        }

        .info { padding: 10px; }
        .info p { margin: 0; font-weight: bold; }
        .group-tag { font-size: 11px; color: #999; }

        /* 排除状态 */
        .card.excluded {
            opacity: var(--excluded-opacity);
            filter: grayscale(100%);
            transform: scale(0.95);
        }

        button {
            padding: 10px 25px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>✨ 明星猜猜看 ✨</h1>

    <div class="controls">
        <button onclick="startGame()">开启新游戏 / 抽取我的角色</button>
        
        <div id="targetDisplay" class="target-box hidden">
            <p>你的目标明星是：<strong id="targetName" style="color:red; font-size:1.2em;">?</strong></p>
            <p style="font-size: 11px; color: #888;">(保密！不要让对面看到屏幕)</p>
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">

        <div class="mode-selector">
            <strong>当前操作模式：</strong>
            <label><input type="radio" name="mode" value="exclude" checked onclick="setMode('exclude')"> 🟢 排除模式</label>
            <label><input type="radio" name="mode" value="submit" onclick="setMode('submit')"> 🔴 提交模式</label>
        </div>
        <p id="modeHint" style="font-size: 12px; color: #666;">(当前：点击卡片将其变暗)</p>
    </div>

    <div class="grid" id="starGrid"></div>

    <script>
        let currentMode = 'exclude'; // 默认模式
        let myTargetName = ""; // 自己抽到的角色名

        const stars = [
            { name: "王俊凯", group: "一代", img: "images/王俊凯.png" },
            { name: "王源", group: "一代", img: "images/王源.png" },
            { name: "易烊千玺", group: "一代", img: "images/易烊千玺.png" },
            { name: "马嘉祺", group: "二代/TNT", img: "images/马嘉祺.png" },
            { name: "丁程鑫", group: "二代/TNT", img: "images/丁程鑫.png" },
            { name: "宋亚轩", group: "二代/TNT", img: "images/宋亚轩.png" },
            { name: "刘耀文", group: "二代/TNT", img: "images/刘耀文.png" },
            { name: "张真源", group: "二代/TNT", img: "images/张真源.png" },
            { name: "严浩翔", group: "二代/TNT", img: "images/严浩翔.png" },
            { name: "贺峻霖", group: "二代/TNT", img: "images/贺峻霖.png" },
            { name: "朱志鑫", group: "三代/TOP", img: "images/朱志鑫.jpg" },
            { name: "张泽禹", group: "三代/TOP", img: "images/张泽禹.jpg" },
            { name: "张极", group: "三代/TOP", img: "images/张极.jpg" },
            { name: "左航", group: "三代/TOP", img: "images/左航.jpg" },
            { name: "苏新皓", group: "三代/TOP", img: "images/苏新皓.jpg" },
            { name: "童禹坤", group: "三代/TFING", img: "images/童禹坤.jpg" },
            { name: "邓佳鑫", group: "三代/TFING", img: "images/邓佳鑫.jpg" },
            { name: "穆祉丞", group: "三代/TFING", img: "images/穆祉丞.jpg" },
            { name: "张子墨", group: "三代/TFING", img: "images/张子墨.jpg" },
            { name: "黄朔", group: "三代/TFING", img: "images/黄朔.jpg" },
            { name: "余宇涵", group: "三代/SOLO", img: "images/余宇涵.png" },
            { name: "张峻豪", group: "三代/SOLO", img: "images/张峻豪.png" },
            { name: "官俊臣", group: "四代", img: "images/官俊臣.png" },
            { name: "张桂源", group: "四代", img: "images/张桂源.png" },
            { name: "张函瑞", group: "四代", img: "images/张函瑞.png" },
            { name: "王橹杰", group: "四代", img: "images/王橹杰.png" },
            { name: "左奇函", group: "四代", img: "images/左奇函.png" },
            { name: "陈奕恒", group: "四代", img: "images/陈奕恒.png" },
            { name: "杨博文", group: "四代", img: "images/杨博文.png" },
            { name: "杨涵博", group: "四代", img: "images/杨涵博.png" },
            { name: "张奕然", group: "四代", img: "images/张奕然.png" },
            { name: "聂玮辰", group: "四代", img: "images/聂玮辰.png" },
            { name: "陈思罕", group: "四代", img: "images/陈思罕.png" },
            { name: "魏子宸", group: "四代", img: "images/魏子宸.png" },
            { name: "李煜东", group: "四代", img: "images/李煜东.png" },
            { name: "陈浚铭", group: "四代", img: "images/陈浚铭.png" },
            { name: "王烁然", group: "四代", img: "images/王烁然.png" }
        ];

        // 切换模式逻辑
        function setMode(mode) {
            currentMode = mode;
            const hint = document.getElementById('modeHint');
            hint.innerText = mode === 'exclude' ? "(当前：点击卡片将其变暗)" : "(当前：点击卡片进行最终决胜提交)";
        }

        // 初始化网格
        function initGrid() {
            const grid = document.getElementById('starGrid');
            grid.innerHTML = '';
            stars.forEach(star => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${star.img}" onerror="this.src='https://via.placeholder.com/160x220?text=${star.name}'">
                    <div class="info">
                        <p>${star.name}</p>
                        <span class="group-tag">${star.group}</span>
                    </div>
                `;
                // 绑定点击事件
                card.onclick = () => handleCardClick(star.name, card);
                grid.appendChild(card);
            });
        }

        // 处理点击
        function handleCardClick(name, element) {
            if (currentMode === 'exclude') {
                element.classList.toggle('excluded');
            } else {
                const sure = confirm(`你确定【${name}】是对方抽到的明星吗？\n一旦提交不可更改！`);
                if (sure) {
                    // 由于目前是单机版，我们需要弹窗让玩家输入对方的角色名来比对
                    const opponentRealTarget = prompt("为了判定输赢，请让对方悄悄输入他抽到的真实姓名：");
                    if (name === opponentRealTarget) {
                        alert("🎉 太棒了！你猜对了！你赢了！");
                    } else {
                        alert(`❌ 猜错了！对方的角色其实是【${opponentRealTarget}】。你输了！`);
                    }
                }
            }
        }

        // 开始游戏
        function startGame() {
            const cards = document.querySelectorAll('.card');
            cards.forEach(c => c.classList.remove('excluded'));
            const randomIndex = Math.floor(Math.random() * stars.length);
            myTargetName = stars[randomIndex].name;
            document.getElementById('targetName').innerText = myTargetName;
            document.getElementById('targetDisplay').classList.remove('hidden');
            alert("✨ 你的角色已选定，保密并开始提问吧！");
        }

        initGrid();
    </script>
</body>
</html>
