<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TF家族猜猜看</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            /* 莫兰蒂色系设定 */
            --primary: #8e9775; /* 莫兰蒂绿 */
            --primary-dark: #6d775c;
            --primary-light: #fafaf6;
            --accent: #a7bbc7; /* 雾霾蓝 */
            --text-main: #555;
            --text-sub: #999;
            --bg: #f2f2f2;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.05);
        }
        body {
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
        }
        
        #home-screen { 
            position: fixed; inset: 0; background: #e5e5e5; 
            display: flex; justify-content: center; align-items: center; z-index: 9999; 
        }
        .menu-box {
            background: white;
            padding: 45px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            width: 80%;
            max-width: 320px;
        }
        
        .btn-main { 
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 500;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }
        
        #game-interface { display: none; width: 100%; max-width: 1000px; padding: 15px; box-sizing: border-box; flex-direction: column; }
        .controls {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
            text-align: center;
        }

        /* 抽取结果展示区优化 */
        #targetDisplay {
            background: var(--primary-light);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        #targetName.masked {
            filter: blur(5px);
            background: #eee;
            color: transparent !important;
            user-select: none;
        }
        .toggle-btn {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; width: 100%; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: var(--card-shadow); cursor: pointer; transition: 0.3s; position: relative; }
        .card img { width: 100%; height: 200px; object-fit: cover; object-position: top; }
        .card.excluded { opacity: 0.2; filter: grayscale(100%) sepia(20%); }
        .card-name { padding: 10px; font-size: 14px; color: var(--text-main); text-align: center; }

        .hidden { display: none !important; }
        .status-tag { font-size: 12px; color: var(--primary); margin-bottom: 10px; font-weight: bold;}
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="menu-box">
            <h2 style="margin-bottom:25px; color:#777;">✨ 游戏模式 ✨</h2>
            <button class="btn-main" onclick="enterMode('single')">单机练习</button>
            <button class="btn-main" style="background: var(--accent);" onclick="enterMode('create')">创建房间</button>
            <button class="btn-main" style="background: #b8b0a6;" onclick="enterMode('join')">加入房间</button>
        </div>
    </div>

    <div id="game-interface">
        <div class="controls">
            <div id="room-info" class="status-tag hidden"></div>
            <div id="conn-status" style="font-size: 12px; color: #aaa; margin-bottom:10px;"></div>
            
            <button class="btn-main" style="margin: 5px auto; width: auto; padding: 10px 25px;" onclick="pickMyTarget()">🎲 抽取我的角色</button>
            
            <div id="targetDisplay" class="hidden">
                <span>你的角色：</span>
                <strong id="targetName" style="color:var(--primary); font-size:18px;">?</strong>
                <button class="toggle-btn" id="toggleTarget" onclick="toggleTargetVisibility()">👁️ 隐藏</button>
            </div>

            <div style="margin: 15px 0; color: #666; font-size: 14px;">
                <label><input type="radio" name="mode" value="exclude" checked onclick="currentMode='exclude'"> 🟢 排除模式</label>
                <label style="margin-left:20px;"><input type="radio" name="mode" value="submit" onclick="currentMode='submit'"> 🔴 提交答案</label>
            </div>
            <small onclick="location.reload()" style="color:#bbb; cursor:pointer;">返回首页</small>
        </div>

        <div class="grid" id="starGrid"></div>
    </div>

    <script>
        const stars = [{ name: "马嘉祺", group: "二代/TNT", img: "images/马嘉祺.jpg" },
            { name: "丁程鑫", group: "二代/TNT", img: "images/丁程鑫.jpg" },
            { name: "宋亚轩", group: "二代/TNT", img: "images/宋亚轩.jpg" },
            { name: "刘耀文", group: "二代/TNT", img: "images/刘耀文.jpg" },
            { name: "张真源", group: "二代/TNT", img: "images/张真源.jpg" },
            { name: "严浩翔", group: "二代/TNT", img: "images/严浩翔.jpg" },
            { name: "贺峻霖", group: "二代/TNT", img: "images/贺峻霖.jpg" },
            { name: "朱志鑫", group: "三代/TOP", img: "images/朱志鑫.jpg" },
            { name: "张泽禹", group: "三代/TOP", img: "images/张泽禹.jpg" },
            { name: "张极", group: "三代/TOP", img: "images/张极.jpg" },
            { name: "左航", group: "三代/TOP", img: "images/左航.jpg" },
            { name: "苏新皓", group: "三代/TOP", img: "images/苏新皓.jpg" },
            { name: "童禹坤", group: "三代/TFING", img: "images/童禹坤.jpg" },
            { name: "邓佳鑫", group: "三代/TFING", img: "images/邓佳鑫.jpg" },
            { name: "穆祉丞", group: "三代/TFING", img: "images/穆祉丞.jpg" },
            { name: "张子墨", group: "三代/TFING", img: "images/张子墨.jpg" },
            { name: "黄朔", group: "三代/TFING", img: "images/黄朔.jpg" },
            { name: "余宇涵", group: "三代/SOLO", img: "images/余宇涵.jpg" },
            { name: "张峻豪", group: "三代/SOLO", img: "images/张峻豪.jpg" },
            { name: "官俊臣", group: "四代", img: "images/官俊臣.jpg" },
            { name: "张桂源", group: "四代", img: "images/张桂源.jpg" },
            { name: "张函瑞", group: "四代", img: "images/张函瑞.jpg" },
            { name: "王橹杰", group: "四代", img: "images/王橹杰.jpg" },
            { name: "左奇函", group: "四代", img: "images/左奇函.jpg" },
            { name: "陈奕恒", group: "四代", img: "images/陈奕恒.jpg" },
            { name: "杨博文", group: "四代", img: "images/杨博文.jpg" },
            { name: "杨涵博", group: "四代", img: "images/杨涵博.jpg" },
            { name: "张奕然", group: "四代", img: "images/张奕然.jpg" },
            { name: "聂玮辰", group: "四代", img: "images/聂玮辰.jpg" },
            { name: "陈思罕", group: "四代", img: "images/陈思罕.jpg" },
            { name: "魏子宸", group: "四代", img: "images/魏子宸.jpg" },
            { name: "李煜东", group: "四代", img: "images/李煜东.jpg" },
            { name: "陈浚铭", group: "四代", img: "images/陈浚铭.jpg" },
            { name: "王烁然", group: "四代", img: "images/王烁然.jpg" }
        ];

        let peer = null, conn = null, myTarget = "", currentMode = 'exclude', isOnline = false, isTargetVisible = true;

        const grid = document.getElementById('starGrid');
        stars.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${s.img}" onerror="this.src='https://via.placeholder.com/140x200?text=${s.name}'">
                             <div class="card-name">${s.name}</div>`;
            card.onclick = (e) => {
                e.stopPropagation();
                handleCardClick(s.name, card);
            };
            grid.appendChild(card);
        });

        function enterMode(mode) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-interface').style.display = 'flex';
            if (mode === 'single') {
                isOnline = false;
                document.getElementById('conn-status').innerText = "当前模式：个人练习";
            } else {
                isOnline = true;
                if (mode === 'create') {
                    const roomNum = Math.random().toString(36).substr(2, 6).toUpperCase();
                    document.getElementById('room-info').innerText = "房间号：" + roomNum;
                    document.getElementById('room-info').classList.remove('hidden');
                    initPeer(`TF-ROOM-${roomNum}`);
                } else {
                    const roomNum = prompt("请输入房间号：");
                    if(!roomNum) return location.reload();
                    initPeer();
                    document.getElementById('conn-status').innerText = "正在寻找房间 " + roomNum + "...";
                    setTimeout(() => {
                        conn = peer.connect(`TF-ROOM-${roomNum}`);
                        setupConn();
                    }, 1000);
                }
            }
        }

        function initPeer(id = null) {
            try {
                peer = id ? new Peer(id, { debug: 2 }) : new Peer({ debug: 2 });
                peer.on('connection', c => { conn = c; setupConn(); });
                peer.on('error', () => alert("连接出错，请刷新页面重试"));
            } catch(e) { console.error("PeerJS 加载失败"); }
        }

        function setupConn() {
            conn.on('open', () => {
                document.getElementById('conn-status').innerText = "✅ 联机成功，游戏开始！";
                document.getElementById('conn-status').style.color = "#8e9775";
            });
            conn.on('data', data => {
                if(data.type === 'CHECK') {
                    const win = (data.guess === myTarget);
                    conn.send({ type: 'RES', win, target: myTarget });
                    alert(win ? "对方猜对了！你输了" : "对方猜错了！你赢了");
                }
                if(data.type === 'RES') {
                    alert(data.win ? "🎉 恭喜！你猜对了，赢了！" : `❌ 遗憾，对方的角色是【${data.target}】`);
                }
            });
        }

        function handleCardClick(name, el) {
            if (currentMode === 'exclude') {
                el.classList.toggle('excluded');
            } else {
                if (isOnline && (!conn || !conn.open)) return alert("请先等待对方进入房间");
                if (confirm(`确定要提交【${name}】作为答案吗？`)) {
                    if (isOnline) conn.send({ type: 'CHECK', guess: name });
                    else alert("单机模式：正确答案确实是练习的好帮手！");
                }
            }
        }

        function pickMyTarget() {
            const idx = Math.floor(Math.random() * stars.length);
            myTarget = stars[idx].name;
            const nameEl = document.getElementById('targetName');
            nameEl.innerText = myTarget;
            nameEl.classList.remove('masked');
            document.getElementById('targetDisplay').classList.remove('hidden');
            document.getElementById('toggleTarget').innerText = "👁️ 隐藏";
            isTargetVisible = true;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('excluded'));
        }

        function toggleTargetVisibility() {
            const nameEl = document.getElementById('targetName');
            const btn = document.getElementById('toggleTarget');
            isTargetVisible = !isTargetVisible;
            if (isTargetVisible) {
                nameEl.classList.remove('masked');
                btn.innerText = "👁️ 隐藏";
            } else {
                nameEl.classList.add('masked');
                btn.innerText = "👁️ 显示";
            }
        }
    </script>
</body>
</html>
