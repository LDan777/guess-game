<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TF家族猜猜看</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #ff8a00;
            --primary-light: #fff3e0;
            --text-main: #333;
            --text-sub: #888;
            --bg: #f6f7fb;
        }
         body {
            font-family: 'PingFang SC', sans-serif;
            background: linear-gradient(180deg, #f6f7fb, #eef1f7);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
        }
                
        /* 还原你喜欢的橙色圆角首页 */
        #home-screen { 
            position: fixed; inset: 0; background: #eee; 
            display: flex; justify-content: center; align-items: center; z-index: 9999; 
        }
        .menu-box {
            background: white;
            padding: 45px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
            width: 80%;
            max-width: 320px;
            animation: fadeIn 0.4s ease;
        }
        
        .menu-box h2 {
            margin-bottom: 25px;
            font-weight: 600;
        }
        .btn-main { 
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 50px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: block;
            transition: all 0.2s ease;
        }
        .btn-main:active {
            transform: scale(0.97);
        }
        .btn-main:active {
            transform: scale(0.97);
        }
        
        /* 游戏主体布局 */
        #game-interface { display: none; width: 100%; max-width: 1000px; padding: 15px; box-sizing: border-box; }
        .controls {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* 明星卡片：解决顶格问题 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; width: 100%; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; position: relative; }
        .card img { width: 100%; height: 200px; object-fit: cover; object-position: top; pointer-events: none; }
        .card.excluded { opacity: 0.15; filter: grayscale(100%); }
        .card-name { padding: 8px; font-size: 14px; font-weight: bold; text-align: center; }

        .hidden { display: none !important; }
        .status-tag { font-size: 12px; color: var(--primary); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="menu-box">
            <h2 style="margin-bottom:20px;">✨ 游戏模式 ✨</h2>
            <button class="btn-main" onclick="enterMode('single')">🙋‍♂️ 单机练习</button>
            <button class="btn-main" onclick="enterMode('create')">🏠 创建房间 (联机)</button>
            <button class="btn-main" onclick="enterMode('join')">🔑 加入房间 (联机)</button>
        </div>
    </div>

    <div id="game-interface">
        <div class="controls">
            <div id="room-info" class="status-tag hidden"></div>
            <div id="conn-status" style="font-size: 12px; color: #888;"></div>
            
            <button class="btn-main" style="margin: 10px auto; width: auto;" onclick="pickMyTarget()">🎲 抽取我的角色</button>
            
            <div id="targetDisplay" class="hidden" style="background:#fff3e0; padding:10px; border-radius:10px; border:1px dashed #ff8a00; margin:10px 0;">
                你的目标是：<strong id="targetName" style="color:red; font-size:18px;">?</strong>
            </div>

            <div style="margin: 15px 0;">
                <label><input type="radio" name="mode" value="exclude" checked onclick="currentMode='exclude'"> 🟢 排除</label>
                <label style="margin-left:20px;"><input type="radio" name="mode" value="submit" onclick="currentMode='submit'"> 🔴 提交</label>
            </div>
            <small onclick="location.reload()" style="color:#999; cursor:pointer;">重选模式</small>
        </div>

        <div class="grid" id="starGrid"></div>
    </div>

    <script>
        const stars = [
            { name: "马嘉祺", group: "TNT", img: "images/马嘉祺.png" },
            { name: "丁程鑫", group: "TNT", img: "images/丁程鑫.png" },
            { name: "宋亚轩", group: "TNT", img: "images/宋亚轩.png" },
            { name: "刘耀文", group: "TNT", img: "images/刘耀文.png" },
            { name: "张真源", group: "TNT", img: "images/张真源.png" },
            { name: "严浩翔", group: "TNT", img: "images/严浩翔.png" },
            { name: "贺峻霖", group: "TNT", img: "images/贺峻霖.png" },
            { name: "朱志鑫", group: "三代", img: "images/朱志鑫.jpg" },
            { name: "张泽禹", group: "三代", img: "images/张泽禹.jpg" },
            { name: "张极", group: "三代", img: "images/张极.jpg" },
            { name: "左航", group: "三代", img: "images/左航.jpg" },
            { name: "苏新皓", group: "三代", img: "images/苏新皓.jpg" },
            { name: "张桂源", group: "四代", img: "images/张桂源.png" },
            { name: "张函瑞", group: "四代", img: "images/张函瑞.png" },
            { name: "王橹杰", group: "四代", img: "images/王橹杰.png" },
            { name: "左奇函", group: "四代", img: "images/左奇函.png" },
            { name: "陈奕恒", group: "四代", img: "images/陈奕恒.png" },
            { name: "杨博文", group: "四代", img: "images/杨博文.png" },
            { name: "杨涵博", group: "四代", img: "images/杨涵博.png" },
            { name: "张奕然", group: "四代", img: "images/张奕然.png" },
            { name: "聂玮辰", group: "四代", img: "images/聂玮辰.png" },
            { name: "陈思罕", group: "四代", img: "images/陈思罕.png" },
            { name: "魏子宸", group: "四代", img: "images/魏子宸.png" },
            { name: "李煜东", group: "四代", img: "images/李煜东.png" },
            { name: "陈浚铭", group: "四代", img: "images/陈浚铭.png" },
            { name: "王烁然", group: "四代", img: "images/王烁然.png" }
        ];

        let peer = null, conn = null, myTarget = "", currentMode = 'exclude', isOnline = false;

        // 初始化网格（放在最前面，确保单机版一定能点）
        const grid = document.getElementById('starGrid');
        stars.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${s.img}" onerror="this.src='https://via.placeholder.com/140x200?text=${s.name}'">
                             <div class="card-name">${s.name}</div>`;
            card.onclick = (e) => {
                e.stopPropagation(); // 防止点击穿透
                handleCardClick(s.name, card);
            };
            grid.appendChild(card);
        });

        function enterMode(mode) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-interface').style.display = 'flex';
            
            if (mode === 'single') {
                isOnline = false;
                document.getElementById('conn-status').innerText = "模式：单机练习";
            } else {
                isOnline = true;
                if (mode === 'create') {
                    const roomNum = Math.floor(1000 + Math.random() * 9000);
                    document.getElementById('room-info').innerText = "房间号：" + roomNum;
                    document.getElementById('room-info').classList.remove('hidden');
                    initPeer(`TF-ROOM-${roomNum}`);
                } else {
                    const roomNum = prompt("请输入房间号：");
                    if(!roomNum) return location.reload();
                    initPeer();
                    document.getElementById('conn-status').innerText = "正在连接房间 " + roomNum + "...";
                    setTimeout(() => {
                        conn = peer.connect(`TF-ROOM-${roomNum}`);
                        setupConn();
                    }, 1000);
                }
            }
        }

        function initPeer(id = null) {
            try {
                peer = id ? new Peer(id) : new Peer();
                peer.on('connection', c => { conn = c; setupConn(); });
                peer.on('error', () => alert("网络初始化失败，请检查网络或刷新"));
            } catch(e) { console.error("PeerJS 加载失败"); }
        }

        function setupConn() {
            conn.on('open', () => {
                document.getElementById('conn-status').innerText = "✅ 联机成功！";
                document.getElementById('conn-status').style.color = "green";
            });
            conn.on('data', data => {
                if(data.type === 'CHECK') {
                    const win = (data.guess === myTarget);
                    conn.send({ type: 'RES', win, target: myTarget });
                    alert(win ? "对方猜对了！你输了" : "对方猜错了！你赢了");
                }
                if(data.type === 'RES') {
                    alert(data.win ? "🎉 你猜对了！赢了！" : `❌ 猜错了，对方是【${data.target}】`);
                }
            });
        }

        function handleCardClick(name, el) {
            if (currentMode === 'exclude') {
                el.classList.toggle('excluded');
            } else {
                if (isOnline && (!conn || !conn.open)) return alert("等待对方连入...");
                if (confirm(`确定最终答案是【${name}】吗？`)) {
                    if (isOnline) conn.send({ type: 'CHECK', guess: name });
                    else alert("单机模式下，这只是练习哦！");
                }
            }
        }

        function pickMyTarget() {
            const idx = Math.floor(Math.random() * stars.length);
            myTarget = stars[idx].name;
            document.getElementById('targetName').innerText = myTarget;
            document.getElementById('targetDisplay').classList.remove('hidden');
            document.querySelectorAll('.card').forEach(c => c.classList.remove('excluded'));
        }
    </script>
</body>
</html>
