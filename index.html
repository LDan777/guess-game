<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TF家族猜猜看 - 官方联机版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #ff8a00; --bg: #f8f9fa; }
        body { font-family: 'PingFang SC', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* 首页大方框 */
        #home-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .menu-box { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 300px;
        }
        .menu-box h2 { margin-bottom: 25px; color: #333; }
        .menu-box button { width: 100%; margin-bottom: 15px; transition: 0.3s; }

        /* 游戏主体 */
        #game-interface { display: none; width: 100%; max-width: 1200px; flex-direction: column; align-items: center; }
        .controls { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; width: 90%; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; width: 100%; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 3px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .card img { width: 100%; height: 220px; object-fit: cover; object-position: top; }
        .card.excluded { opacity: 0.15; filter: grayscale(100%); }
        
        button { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 14px; }
        button:hover { opacity: 0.9; transform: scale(1.05); }
        .hidden { display: none; }
        .room-info { color: #ff8a00; font-weight: bold; font-size: 1.2em; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="menu-box">
            <h2>✨ 游戏模式 ✨</h2>
            <button onclick="enterMode('single')">🙋‍♂️ 单机练习</button>
            <button onclick="enterMode('create')">🏠 创建房间 (联机)</button>
            <button onclick="enterMode('join')">🔑 加入房间 (联机)</button>
        </div>
    </div>

    <div id="game-interface">
        <h1 id="game-title">TF家族猜猜看</h1>
        
        <div id="online-panel" class="controls hidden">
            <div id="room-display" class="room-info"></div>
            <div id="conn-status" style="font-size: 12px; color: #666;">等待连接...</div>
        </div>

        <div class="controls">
            <button onclick="pickMyTarget()">🎲 抽取我的角色</button>
            <div id="targetDisplay" style="margin-top:10px; padding:10px; background:#fff3e0; border:1px dashed #ff8a00;" class="hidden">
                我的角色是：<strong id="targetName" style="color:red;">?</strong>
            </div>
            
            <div style="margin-top: 15px;">
                <label><input type="radio" name="mode" value="exclude" checked onclick="currentMode='exclude'"> 🟢 排除</label>
                <label style="margin-left:15px;"><input type="radio" name="mode" value="submit" onclick="currentMode='submit'"> 🔴 提交(猜对方)</label>
            </div>
            <button onclick="location.reload()" style="background:#666; margin-top:10px; padding:5px 15px; font-size:12px;">返回主菜单</button>
        </div>

        <div class="grid" id="starGrid"></div>
    </div>

    <script>
        const stars = [
            { name: "马嘉祺", group: "TNT", img: "images/马嘉祺.png" },
            { name: "丁程鑫", group: "TNT", img: "images/丁程鑫.png" },
            { name: "宋亚轩", group: "TNT", img: "images/宋亚轩.png" },
            { name: "刘耀文", group: "TNT", img: "images/刘耀文.png" },
            { name: "张真源", group: "TNT", img: "images/张真源.png" },
            { name: "严浩翔", group: "TNT", img: "images/严浩翔.png" },
            { name: "贺峻霖", group: "TNT", img: "images/贺峻霖.png" },
            { name: "朱志鑫", group: "三代", img: "images/朱志鑫.jpg" },
            { name: "张泽禹", group: "三代", img: "images/张泽禹.jpg" },
            { name: "张极", group: "三代", img: "images/张极.jpg" },
            { name: "左航", group: "三代", img: "images/左航.jpg" },
            { name: "苏新皓", group: "三代", img: "images/苏新皓.jpg" },
            { name: "左奇函", group: "四代", img: "images/左奇函.png" },
            { name: "张桂源", group: "四代", img: "images/张桂源.png" }
            { name: "张函瑞", group: "四代", img: "images/张函瑞.png" },
            { name: "王橹杰", group: "四代", img: "images/王橹杰.png" },
            { name: "左奇函", group: "四代", img: "images/左奇函.png" },
            { name: "陈奕恒", group: "四代", img: "images/陈奕恒.png" },
            { name: "杨博文", group: "四代", img: "images/杨博文.png" },
            { name: "杨涵博", group: "四代", img: "images/杨涵博.png" },
            { name: "张奕然", group: "四代", img: "images/张奕然.png" },
            { name: "聂玮辰", group: "四代", img: "images/聂玮辰.png" },
            { name: "陈思罕", group: "四代", img: "images/陈思罕.png" },
            { name: "魏子宸", group: "四代", img: "images/魏子宸.png" },
            { name: "李煜东", group: "四代", img: "images/李煜东.png" },
            { name: "陈浚铭", group: "四代", img: "images/陈浚铭.png" },
            { name: "王烁然", group: "四代", img: "images/王烁然.png" }
        ];

        let peer = null;
        let conn = null;
        let myTarget = "";
        let currentMode = 'exclude';
        let isOnline = false;

        // 切换模式
        function enterMode(mode) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-interface').style.display = 'flex';
            
            if (mode === 'single') {
                isOnline = false;
                document.getElementById('game-title').innerText = "TF猜猜看 - 单机模式";
            } else if (mode === 'create') {
                isOnline = true;
                const roomNum = Math.floor(1000 + Math.random() * 9000); // 生成4位数字
                initPeer(`TF-ROOM-${roomNum}`);
                document.getElementById('online-panel').classList.remove('hidden');
                document.getElementById('room-display').innerText = "房间号：" + roomNum;
            } else if (mode === 'join') {
                isOnline = true;
                const roomNum = prompt("请输入4位房间号：");
                if(!roomNum) return location.reload();
                initPeer(); // 加入者随机生成临时ID
                setTimeout(() => {
                    conn = peer.connect(`TF-ROOM-${roomNum}`);
                    setupConn();
                }, 1000);
                document.getElementById('online-panel').classList.remove('hidden');
                document.getElementById('room-display').innerText = "正在加入房间：" + roomNum;
            }
        }

        function initPeer(id = null) {
            peer = id ? new Peer(id) : new Peer();
            peer.on('connection', c => {
                conn = c;
                setupConn();
            });
        }

        function setupConn() {
            conn.on('open', () => {
                document.getElementById('conn-status').innerText = "✅ 联机成功！请开始抽卡对战。";
            });
            conn.on('data', data => {
                if(data.type === 'CHECK') {
                    const isWin = (data.guess === myTarget);
                    conn.send({ type: 'RESULT', isWin: isWin, realTarget: myTarget });
                    alert(isWin ? "对方猜对了！你输了 😭" : "对方猜错了！你赢了 🏆");
                }
                if(data.type === 'RESULT') {
                    alert(data.isWin ? "🎉 恭喜！你猜对了，你赢了！" : `❌ 猜错了，对方其实是【${data.realTarget}】`);
                }
            });
        }

        function handleCardClick(name, el) {
            if (currentMode === 'exclude') {
                el.classList.toggle('excluded');
            } else {
                if (isOnline && !conn) return alert("对方还没连进来呢！");
                if (confirm(`确定最终答案是【${name}】吗？`)) {
                    if (isOnline) {
                        conn.send({ type: 'CHECK', guess: name });
                    } else {
                        // 单机模式提示
                        alert("单机模式提交仅用于练习，没有对手判定哦。");
                    }
                }
            }
        }

        function pickMyTarget() {
            const randomIndex = Math.floor(Math.random() * stars.length);
            myTarget = stars[randomIndex].name;
            document.getElementById('targetName').innerText = myTarget;
            document.getElementById('targetDisplay').classList.remove('hidden');
            document.querySelectorAll('.card').forEach(c => c.classList.remove('excluded'));
        }

        // 初始化网格
        const grid = document.getElementById('starGrid');
        stars.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${s.img}" onerror="this.src='https://via.placeholder.com/160x220?text=${s.name}'">
                             <div style="padding:10px"><b>${s.name}</b><br><small style="color:#999">${s.group}</small></div>`;
            card.onclick = () => handleCardClick(s.name, card);
            grid.appendChild(card);
        });
    </script>
</body>
</html>
